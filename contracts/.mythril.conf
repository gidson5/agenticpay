# Mythril Configuration for AgenticPay
# Symbolic execution tool for deep semantic analysis

[mythril]
# Execution timeout (seconds)
execution_timeout = 300

# Creation timeout (seconds)
creation_timeout = 300

# Gas limit for symbolic execution
gas_limit = 8000000

[analysis]
# Search depth
search_depth = 24

# Loop bound
loop_bound = 3

# Maximum timeout for query solving
solver_timeout = 10000

# Create timeout
creation_timeout = 300

[output]
# Verbosity level (0-3)
verbosity = 2

# Simplify control flow
simplify_control_flow = true

[security]
# Enable coverage analysis
enable_coverage = true

# Enable gas tracking
track_gas = true

# Enable state traversal
state_traversal = true

[performance]
# Number of processes
workers = 0

# Parallel execution
parallel = true

# Cache bytecode analysis
cache_bytecode = true

[findings]
# Report all issues
report_all = true

# Confidence level (low, medium, high)
min_confidence = "high"

# Classification
classifications = [
  "reentrancy",
  "assertion-failure",
  "delegatecall-to-untrusted",
  "callstack-depth",
  "exception-state",
  "integer-overflow",
  "jump-to-arbitrary-location",
  "mishandled-exception",
  "out-of-bounds-read",
  "parity-multisig-bug-or-authorization",
  "selfdestruct",
  "use-of-deprecated-solidity-function",
  "unchecked-external-call",
  "unchecked-math",
  "write-to-arbitrary-storage"
]
